name: Sandbox Kubernetes Tests

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'kubernetes/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'

jobs:
  controller-e2e:
    name: Controller E2E Tests (Kubernetes v${{ matrix.version }})
    strategy:
      fail-fast: false
      matrix:
        version: ["1.21.1", "1.22.4", "1.24.4", "1.26.4", "1.28.6", "1.30.4", "1.32.2", "1.34.2"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        working-directory: kubernetes
        run: |
          make test-e2e KIND_K8S_VERSION=v${{ matrix.version }}

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.0'

      - name: Run golint
        working-directory: kubernetes
        run: |
          make lint

      - name: Build binary
        working-directory: kubernetes
        run: |
          make build
          make task-executor-build

      - name: Run tests
        working-directory: kubernetes
        run: |
          make test